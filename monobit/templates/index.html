<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />

    {% if debug %}
    <!-- Vite Dev Server -->
    <script type="module" src="http://localhost:5173/@vite/client"></script>
    <script type="module" src="http://localhost:5173/monobit/web/main.js"></script>
    {% else %}
    <!-- Production Assets -->
    {% for css in vite_css %}
    <link rel="stylesheet" href="{{ css }}">
    {% endfor %}

    <script type="module" src="{{ vite_js }}"></script>
    {% endif %}
</head>

<body>
    <div id="app"></div>
</body>

</html>
